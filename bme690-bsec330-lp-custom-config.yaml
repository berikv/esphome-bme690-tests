external_components:
  - source: github://berikv/esphome@dev  # For testing the BME690 PR
    components: [bme690]
    refresh: 0s

bme690:
  id: bme690_sensor
  i2c_id: bus_a
  address: 0x76
  bsec_library: /config/esphome/bme690/lib_330_s3.a  # BSEC 3.3.0.0 libalgobsec.a for your MCU target
  # This repo includes this Bosch config as config/bme690_iaq_33v_3s_28d.config.
  # Copy it to your ESPHome config directory, or update this path to wherever you placed it.
  bsec_config: /config/esphome/bme690/bme690_iaq_33v_3s_28d.config
  sample_rate: LP
  update_interval: 3s  # LP is a 3s cadence; slower polling can trigger BSEC timing warning 100
  state_save_interval: 6h
  temperature_offset: 0  # tune to raw die temperature minus ambient temperature for your board/enclosure

sensor:
  - platform: bme690
    bme690_id: bme690_sensor
    iaq: { name: BME690 IAQ }
    static_iaq: { name: BME690 Static IAQ }
    co2_equivalent: { name: BME690 CO2 Equivalent }
    compensated_temperature: { name: BME690 Temperature }
    compensated_humidity: { name: BME690 Humidity }
    pressure: { name: BME690 Pressure }
    gas_resistance: { name: BME690 Gas Resistance }

text_sensor:
  - platform: bme690
    bme690_id: bme690_sensor
    iaq_accuracy: { name: BME690 IAQ Accuracy }
